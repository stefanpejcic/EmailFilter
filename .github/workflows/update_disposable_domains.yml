name: Update Disposable Domains

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest disposable domains list
        run: |
          mkdir -p lists
          curl -sSL https://stefanpejcic.github.io/disposable-email-domains/domains.txt -o lists/disposable_domains.txt

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          git add lists/disposable_domains.txt
          
          # Check if there are actual staged changes to commit
          if git diff --cached --quiet; then
            echo "No changes detected in the domain list."
          else
            git commit -m "Update disposable domains list [skip ci]"
            git push
          fi
